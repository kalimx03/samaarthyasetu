name: SamaarthyaSetu CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check samaarthya_ops_env/ server/ inference.py --ignore E501

      - name: Run environment tests
        run: python -m pytest tests/test_environment.py -v --tb=short

      - name: Run task integration tests
        run: python -m pytest tests/test_tasks.py -v --tb=short

      - name: Run reward shaping tests
        run: python -m pytest tests/test_reward_shaping.py -v --tb=short

      - name: Run grader and API tests
        run: python -m pytest tests/test_graders_and_api.py -v --tb=short

      - name: Run inference mode tests
        run: python -m pytest tests/test_inference_modes.py -v --tb=short

      - name: Run full suite with coverage
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v \
            --cov=samaarthya_ops_env \
            --cov-report=term-missing \
            --tb=short

      - name: Validate OpenEnv interface (reset / step / state)
        run: make validate

      - name: Run baseline inference — rules mode
        run: python inference.py --mode rules
        env:
          HF_TOKEN: ""

      - name: Assert baseline average score >= 0.75
        run: |
          python -c "
          import json
          with open('inference_results.json') as f:
              data = json.load(f)
          avg = data['average_score']
          print(f'Average score: {avg}')
          assert avg >= 0.75, f'Score {avg} below 0.75 threshold'
          print('✅ Score threshold met')
          "

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t samaarthyasetu:ci-${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name setu_test -p 7860:7860 \
            samaarthyasetu:ci-${{ github.sha }}
          sleep 10
          curl -f http://localhost:7860/health      || exit 1
          curl -f http://localhost:7860/tasks        || exit 1
          curl -f http://localhost:7860/candidates   || exit 1
          echo "✅ Docker smoke test passed"
          docker stop setu_test
